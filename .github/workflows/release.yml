name: Build installers

# Build ready-to-install apps for macOS (.dmg) and Windows (.exe)
# on real macOS + Windows cloud runners, then attach both to a GitHub Release.
#
# Trigger: push a tag like v1.0.0  (or run manually from the Actions tab).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon (arm64) → matches M-series Macs
            platform: mac
          - os: windows-latest    # x64 → standard Windows .exe
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # node-gyp (used to compile the native addon) needs Python's distutils,
      # which was removed in Python 3.12+. Pin 3.11 so the build works on both
      # macOS and Windows runners.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Installs deps, downloads the NDI SDK, and compiles the native addon
      # for THIS runner's OS (this is why Windows must build on Windows).
      - name: Install dependencies
        run: npm install
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'   # don't try to code-sign on mac

      - name: Build installer
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
